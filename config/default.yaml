experiment:
  name: nanonav_default
  seed: 42

arena:
  width: 600
  height: 400
  target:
    x: 550
    y: 200
    radius: 20
  spawn:
    x_min: 0
    x_max: 30
  obstacles: []
  max_steps: 1000
  dt: 0.016

agents:
  count: 10
  radius: 4
  mass: 1.0
  max_thrust: 2.0
  drag: 0.15
  max_speed: 3.0
  delivery_radius: 20
  sensing_radius: 60
  neighbor_count: 2
  obs_dim: 20
  action_dim: 2

fluid:
  mode: still
  grid_cell_size: 10
  flow_strength: 1.0
  grad_strength: 0.5
  drift:
    vx: 0.8
    vy: 0.0
  turbulent:
    update_interval: 5
    noise_scale: 1.0
    smooth_sigma: 2.0
  poiseuille: false
  pulsatile:
    enabled: false
    frequency_hz: 1.0

gradient:
  blur_passes: 20
  edge_concentration: 0.05
  noise_scale: 0.1

reward:
  distance_coeff: 0.01
  delivery_bonus: 10.0
  collision_penalty: 1.0
  thrust_cost_coeff: 0.005
  coverage_coeff: 0.02
  time_penalty: 0.001

training:
  algorithm: mappo
  rollout_length: 2048
  batch_size: 256
  ppo_epochs: 10
  clip_epsilon: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 0.0003
  entropy_coeff: 0.01
  max_grad_norm: 0.5
  total_timesteps: 5000000
  hidden_dim: 64
  checkpoint_dir: experiments/default
